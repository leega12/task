<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과제 관리</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 760px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
}

h1 {
    text-align: center;
}

.count-box {
    text-align: center;
    font-weight: bold;
    margin-bottom: 15px;
}

.input-area {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 15px;
}

.input-area input,
.input-area select {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

#subjectInput {
    flex: 1;
    min-width: 150px;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #4f7cff;
    color: white;
}

.filter-area {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filter-area button {
    background: #333;
}

.header {
    display: flex;
    padding: 10px;
    font-weight: bold;
    border-bottom: 2px solid #ddd;
}

.header-subject {
    flex: 1;
}

.header-date {
    width: 120px;
    text-align: center;
}

.header-dday {
    width: 80px;
    text-align: center;
}

.task {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    margin-top: 7px;
    border-radius: 8px;
    border-left: 8px solid #999;
}

.subject {
    flex: 1;
    font-weight: bold;
}

.deadline {
    width: 120px;
    text-align: center;
}

.dday {
    width: 80px;
    text-align: center;
    font-weight: bold;
}

.delete-btn {
    background: #888;
    padding: 6px 10px;
}

.done .subject,
.done .deadline,
.done .dday {
    color: gray;
    text-decoration: line-through;
}

.urgent {
    background: #ffdede;
}

.soon {
    background: #fff2d9;
}

.safe {
    background: #e2f0ff;
}

.finished {
    background: #ededed;
}

.color-red {
    border-left-color: #ff5c5c;
}

.color-blue {
    border-left-color: #4f7cff;
}

.color-green {
    border-left-color: #49b36d;
}

.color-purple {
    border-left-color: #9b59b6;
}

.color-yellow {
    border-left-color: #f1c40f;
}

.blink {
    animation: blinkEffect 0.8s infinite;
}

@keyframes blinkEffect {
    0% {
        opacity: 1;
    }
    50% {
        opacity: 0.35;
    }
    100% {
        opacity: 1;
    }
}

.empty {
    text-align: center;
    color: gray;
    padding: 25px;
}
</style>
</head>

<body>

<div class="container">

    <h1>📚 과제 관리</h1>

    <div class="count-box" id="countBox"></div>

    <div class="input-area">
        <input type="text" id="subjectInput" placeholder="과목 입력">
        <input type="date" id="deadlineInput">

        <select id="colorInput">
            <option value="color-blue">파랑</option>
            <option value="color-red">빨강</option>
            <option value="color-green">초록</option>
            <option value="color-purple">보라</option>
            <option value="color-yellow">노랑</option>
        </select>

        <button onclick="addTask()">추가</button>
    </div>

    <div class="filter-area">
        <button onclick="showAll()">전체 보기</button>
        <button onclick="showToday()">오늘 해야 할 일</button>
    </div>

    <div class="header">
        <div style="width:25px;"></div>
        <div class="header-subject">과목</div>
        <div class="header-date">마감기한</div>
        <div class="header-dday">D-Day</div>
        <div style="width:60px;"></div>
    </div>

    <div id="taskList"></div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filterMode = "all";

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    const subject = document.getElementById("subjectInput").value.trim();
    const deadline = document.getElementById("deadlineInput").value;
    const color = document.getElementById("colorInput").value;

    if (!subject || !deadline) {
        alert("과목과 마감기한을 입력하세요.");
        return;
    }

    tasks.push({
        subject: subject,
        deadline: deadline,
        color: color,
        done: false
    });

    document.getElementById("subjectInput").value = "";
    document.getElementById("deadlineInput").value = "";

    saveTasks();
    renderTasks();
}

function getDiffDays(deadline) {
    const today = new Date();
    today.setHours(0,0,0,0);

    const due = new Date(deadline);
    due.setHours(0,0,0,0);

    return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
}

function getDday(deadline) {
    const diff = getDiffDays(deadline);

    if (diff === 0) return "D-Day";
    if (diff > 0) return "D-" + diff;
    return "지남";
}

function getClass(task) {
    if (task.done) return "finished";

    const diff = getDiffDays(task.deadline);

    if (diff <= 1) return "urgent";
    if (diff <= 3) return "soon";
    return "safe";
}

function toggleDone(index) {
    tasks[index].done = !tasks[index].done;

    saveTasks();
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);

    saveTasks();
    renderTasks();
}

function showAll() {
    filterMode = "all";
    renderTasks();
}

function showToday() {
    filterMode = "today";
    renderTasks();
}

function updateCount() {
    const remaining = tasks.filter(task => !task.done).length;
    const todayTasks = tasks.filter(task => !task.done && getDiffDays(task.deadline) === 0).length;

    document.getElementById("countBox").innerText =
        `남은 과제 ${remaining}개 | 오늘 마감 ${todayTasks}개`;
}

function renderTasks() {
    tasks.sort((a, b) => {
        if (a.done !== b.done) {
            return a.done - b.done;
        }

        return new Date(a.deadline) - new Date(b.deadline);
    });

    updateCount();

    const taskList = document.getElementById("taskList");
    taskList.innerHTML = "";

    let visibleTasks = tasks;

    if (filterMode === "today") {
        visibleTasks = tasks.filter(task => !task.done && getDiffDays(task.deadline) === 0);
    }

    if (visibleTasks.length === 0) {
        taskList.innerHTML = `<div class="empty">표시할 과제가 없습니다.</div>`;
        return;
    }

    visibleTasks.forEach((task) => {
        const realIndex = tasks.indexOf(task);

        const div = document.createElement("div");

        const isDday = getDiffDays(task.deadline) === 0 && !task.done;

        div.className = `
            task
            ${getClass(task)}
            ${task.color || "color-blue"}
            ${task.done ? "done" : ""}
            ${isDday ? "blink" : ""}
        `;

        div.innerHTML = `
            <input
                type="checkbox"
                ${task.done ? "checked" : ""}
                onchange="toggleDone(${realIndex})"
            >

            <div class="subject">${task.subject}</div>

            <div class="deadline">${task.deadline}</div>

            <div class="dday">
                ${task.done ? "완료" : getDday(task.deadline)}
            </div>

            <button
                class="delete-btn"
                onclick="deleteTask(${realIndex})"
            >
                삭제
            </button>
        `;

        taskList.appendChild(div);
    });
}

renderTasks();
</script>

</body>
</html>
