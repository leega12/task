<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>과제 관리</title>

<link rel="icon" type="image/png" href="icon1.png?v=3">
<link rel="shortcut icon" type="image/png" href="icon1.png?v=3">
<link rel="apple-touch-icon" href="icon1.png?v=3">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f7cff">

<style>
* {
    box-sizing: border-box;
}

.datetime-row{
    display:flex;
    gap:10px;
}

.datetime-row > div{
    flex:1;
}

body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
}

h1 {
    text-align: center;
    font-size: 34px;
}

.count-box {
    text-align: center;
    font-weight: bold;
    margin-bottom: 18px;
    font-size: 18px;
}

.input-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input, select, button, textarea {
    width: 100%;
    padding: 13px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

textarea {
    resize: vertical;
    min-height: 70px;
}

button {
    border: none;
    background: #4f7cff;
    color: white;
    cursor: pointer;
}

.filter-area {
    display: flex;
    gap: 10px;
    margin: 16px 0;
}

.filter-area button {
    background: #333;
}

.task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 12px;
    border-left: 8px solid #4f7cff;
}

.task input[type="checkbox"] {
    width: 20px;
    margin-top: 4px;
}

.task-content {
    flex: 1;
    min-width: 0;
}

.subject {
    font-weight: bold;
    font-size: 18px;
    word-break: keep-all;
}

.meta {
    margin-top: 6px;
    font-size: 14px;
    color: #555;
}

.description {
    margin-top: 8px;
    font-size: 14px;
    color: #444;
    line-height: 1.4;
}

.time-left {
    margin-top: 5px;
    font-size: 14px;
    font-weight: bold;
    color: #d43f3f;
}

.delete-btn {
    width: auto;
    padding: 7px 10px;
    font-size: 13px;
    background: #888;
}

.done .subject,
.done .meta,
.done .description,
.done .time-left {
    color: gray;
    text-decoration: line-through;
}

.urgent { background: #ffdede; }
.soon { background: #fff2d9; }
.safe { background: #e2f0ff; }
.finished { background: #ededed; }

.color-blue { border-left-color: #4f7cff; }
.color-red { border-left-color: #ff5c5c; }
.color-green { border-left-color: #49b36d; }
.color-purple { border-left-color: #9b59b6; }
.color-yellow { border-left-color: #f1c40f; }

.blink {
    animation: blinkEffect 0.9s infinite;
}

@keyframes blinkEffect {
    0% { opacity: 1; }
    50% { opacity: 0.45; }
    100% { opacity: 1; }
}

.empty {
    text-align: center;
    color: gray;
    padding: 30px 0;
}
</style>
</head>

<body>

<div class="container">
    <h1>📚 과제 관리</h1>

    <div class="count-box" id="countBox"></div>

    <div class="input-area">
        <input type="text" id="subjectInput" placeholder="과목 입력">

        <textarea id="descriptionInput" placeholder="간단한 설명 입력"></textarea>

        <div class="datetime-row">

            <div>
                <div class="input-title">
                    📅 마감 날짜
                </div>

                <input type="date" id="deadlineInput">
            </div>

            <div>
                <div class="input-title">
                    ⏰ 마감 시간
                </div>

                <input type="time" id="timeInput">
            </div>

        </div>
        <select id="colorInput">
            <option value="color-blue">파랑</option>
            <option value="color-red">빨강</option>
            <option value="color-green">초록</option>
            <option value="color-purple">보라</option>
            <option value="color-yellow">노랑</option>
        </select>

        <button onclick="addTask()">추가</button>
    </div>

    <div class="filter-area">
        <button onclick="showAll()">전체 보기</button>
        <button onclick="showToday()">오늘 할 일</button>
    </div>

    <div id="taskList"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filterMode = "all";

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    const subject = document.getElementById("subjectInput").value.trim();
    const description = document.getElementById("descriptionInput").value.trim();
    const deadline = document.getElementById("deadlineInput").value;
    const time = document.getElementById("timeInput").value;
    const color = document.getElementById("colorInput").value;

    if (!subject || !deadline) {
        alert("과목과 마감기한을 입력하세요.");
        return;
    }

    tasks.push({
        subject,
        description,
        deadline,
        time,
        color,
        done: false
    });

    document.getElementById("subjectInput").value = "";
    document.getElementById("descriptionInput").value = "";
    document.getElementById("deadlineInput").value = "";
    document.getElementById("timeInput").value = "";

    saveTasks();
    renderTasks();
}

function getTaskDate(task) {
    return new Date(`${task.deadline}T${task.time || "23:59"}`);
}

function getDiffDays(deadline) {
    const today = new Date();
    today.setHours(0,0,0,0);

    const due = new Date(deadline);
    due.setHours(0,0,0,0);

    return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
}

function getDday(deadline) {
    const diff = getDiffDays(deadline);

    if (diff === 0) return "D-Day";
    if (diff > 0) return "D-" + diff;
    return "마감 지남";
}

function getTodayTimeLeft(task) {
    const diffDays = getDiffDays(task.deadline);

    if (diffDays !== 0 || !task.time || task.done) {
        return "";
    }

    const now = new Date();
    const due = getTaskDate(task);
    const diffMs = due - now;

    if (diffMs <= 0) {
        return "시간 지남";
    }

    const totalMinutes = Math.floor(diffMs / (1000 * 60));
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;

    return `${hours}시간 ${minutes}분 남음`;
}

function getClass(task) {
    if (task.done) return "finished";

    const diff = getDiffDays(task.deadline);

    if (diff <= 1) return "urgent";
    if (diff <= 3) return "soon";
    return "safe";
}

function toggleDone(index) {
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
}

function showAll() {
    filterMode = "all";
    renderTasks();
}

function showToday() {
    filterMode = "today";
    renderTasks();
}

function updateCount() {
    const remaining = tasks.filter(task => !task.done).length;
    const today = tasks.filter(task => !task.done && getDiffDays(task.deadline) === 0).length;

    document.getElementById("countBox").innerText =
        `남은 과제 ${remaining}개 | 오늘 마감 ${today}개`;
}

function renderTasks() {
    tasks.sort((a, b) => {
        if (a.done !== b.done) {
            return a.done - b.done;
        }

        return getTaskDate(a) - getTaskDate(b);
    });

    updateCount();

    const taskList = document.getElementById("taskList");
    taskList.innerHTML = "";

    let visibleTasks = tasks;

    if (filterMode === "today") {
        visibleTasks = tasks.filter(task => !task.done && getDiffDays(task.deadline) === 0);
    }

    if (visibleTasks.length === 0) {
        taskList.innerHTML = `<div class="empty">표시할 과제가 없습니다.</div>`;
        return;
    }

    visibleTasks.forEach(task => {
        const realIndex = tasks.indexOf(task);
        const isDday = getDiffDays(task.deadline) === 0 && !task.done;
        const timeLeft = getTodayTimeLeft(task);

        const div = document.createElement("div");

        div.className = `
            task
            ${getClass(task)}
            ${task.color || "color-blue"}
            ${task.done ? "done" : ""}
            ${isDday ? "blink" : ""}
        `;

        div.innerHTML = `
            <input
                type="checkbox"
                ${task.done ? "checked" : ""}
                onchange="toggleDone(${realIndex})"
            >

            <div class="task-content">
                <div class="subject">${task.subject}</div>

                <div class="meta">
                    📅 ${task.deadline}
                    ${task.time ? ` ${task.time}` : ""}
                    ·
                    ${task.done ? "완료" : getDday(task.deadline)}
                </div>

                ${
                    timeLeft
                    ? `<div class="time-left">⏰ ${timeLeft}</div>`
                    : ""
                }

                ${
                    task.description
                    ? `<div class="description">${task.description}</div>`
                    : ""
                }
            </div>

            <button class="delete-btn" onclick="deleteTask(${realIndex})">
                삭제
            </button>
        `;

        taskList.appendChild(div);
    });
}

renderTasks();
setInterval(renderTasks, 60000);
</script>

</body>
</html>
